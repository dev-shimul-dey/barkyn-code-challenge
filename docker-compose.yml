version: "3.9"

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PORT: ${DB_PORT}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE}
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE}
    container_name: api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./api:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    ports:
      - "${API_PORT}:${API_CONTAINER_PORT}"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # reuse same base node image from .env
        NODE_IMAGE: ${NODE_IMAGE}
    container_name: web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
    environment:
      # Frontend browser accesses backend via localhost (host machine)
      VITE_API_URL: "http://localhost:${API_PORT}"
    volumes:
      - ./web:/usr/src/app
      - web_node_modules:/usr/src/app/node_modules
    ports:
      - "${WEB_PORT}:${WEB_CONTAINER_PORT}"

volumes:
  postgres-data:
  api_node_modules:
  web_node_modules:
